[model_task_config.utils] # 组件使用的模型, 例如表情包模块, 取名模块, 关系模块, 麦麦的情绪变化等，是麦麦必须的模型
model_list = [
    "deepseek-v4-flash",
    "qwen3.5-35b-a3b-nonthink",
] # 使用的模型列表, 每个元素对应上面的模型名称(name)
max_tokens = 4096 # 任务最大输出token数
temperature = 0.5 # 模型温度
slow_threshold = 15 # 慢请求阈值（秒），超过此值会输出警告日志
selection_strategy = "random" # 模型选择策略：balance（负载均衡）、random（随机选择）或 sequential（按配置顺序优先选择）

[model_task_config.replyer] # 首要回复模型配置, 还用于表达器和表达方式学习
model_list = [
    "deepseek-v4-flash",
    "qwen3.5-flash",
    "ali-glm-5",
] # 使用的模型列表, 每个元素对应上面的模型名称(name)
