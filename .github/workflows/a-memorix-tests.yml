name: A_Memorix Tests

on:
  pull_request:
    paths:
      - "src/A_memorix/**"
      - "src/services/memory_service.py"
      - "src/webui/routers/memory.py"
      - "pytests/A_memorix_test/**"
      - "pytests/webui/test_memory_routes_integration.py"
      - "pyproject.toml"
      - "requirements.txt"
      - "uv.lock"
      - ".github/workflows/a-memorix-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: 安装项目依赖
        run: uv sync --frozen --group dev
      - name: 运行 A_Memorix 测试
        run: uv run pytest -q pytests/A_memorix_test pytests/webui/test_memory_routes_integration.py
